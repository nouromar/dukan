<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    V4 "Tall D in door"
    Bold "D" almost fills the doorway — the D is the hero, the shop
    is the frame. Green primary; cream-on-white doorway for the
    inset D to register. Use this if you want the brand letter to
    dominate.
  -->

  <!-- shop body + peaked roof -->
  <path fill="#005C46"
        d="M 88 432
           L 88 208
           L 256 112
           L 424 208
           L 424 432
           Z" />

  <!-- big rectangular doorway -->
  <rect x="184" y="240" width="144" height="192" fill="#F5EFE6" />

  <!-- bold "D" filling most of the doorway -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 208 264
           L 268 264
           A 60 60 0 0 1 268 408
           L 208 408
           Z
           M 240 296
           L 268 296
           A 28 28 0 0 1 268 376
           L 240 376
           Z" />
</svg>
