<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    V2 "D-shaped doorway, mono"
    The doorway IS a "D" laid upright (vertical left edge, curved
    right edge). Single colour — cleanest scaling, fewest moving
    parts, works as Android adaptive-icon foreground unmodified.
    The negative-space D is the brand mark.
  -->

  <!-- shop body + D-shaped doorway cut as a single fill-rule="evenodd" path -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 80 432
           L 80 200
           L 256 104
           L 432 200
           L 432 432
           Z
           M 208 432
           L 208 240
           A 96 96 0 0 1 208 432
           Z" />
</svg>
