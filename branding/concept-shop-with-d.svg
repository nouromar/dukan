<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Concept "shop-with-D-as-lock" — storefront + canopy stripe + "D"
    that doubles as a padlock guarding the shop.
      * Body & D & lock parts: #005C46 (app primary).
      * Canopy band: #4189DD (Somali flag blue, Pantone 279 C).
    The D keeps its letterform (stem-left, bowl-right) so the brand
    still reads as "D" — but a shackle sits above it and a keyhole
    sits inside the counter, transforming the meaning to
    "Dukan guards the shop's property."

    Layer order: body → canopy stripe → doorway opening → shackle
    → D body → keyhole.
  -->

  <!-- shopfront body + roof -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 80 432
           L 80 208
           L 256 112
           L 432 208
           L 432 432
           Z" />

  <!-- canopy / awning band across the front (Somali flag blue) -->
  <rect x="80" y="208" width="352" height="36" fill="#4189DD" />

  <!-- doorway opening (taller than the original to fit shackle + D) -->
  <path fill="#FFFFFF"
        d="M 196 432
           L 196 252
           L 316 252
           L 316 432
           Z" />

  <!-- padlock shackle — inverted U above the D, fits in the upper
       doorway. Symmetric, 80px wide, 12px stroke equivalent. -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 216 304
           L 216 272
           A 40 40 0 0 1 296 272
           L 296 304
           L 284 304
           L 284 280
           A 28 28 0 0 0 228 280
           L 228 304
           Z" />

  <!-- "D" as the lock body — same proportions as before, just
       lowered to make room for the shackle. -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 200 304
           L 252 304
           A 58 58 0 0 1 252 420
           L 200 420
           Z
           M 224 328
           L 252 328
           A 34 34 0 0 1 252 396
           L 224 396
           Z" />

  <!-- keyhole inside the D counter — circle head + tapered slot,
       slightly right-of-center to sit in the visual sweet spot of
       the asymmetric D counter. -->
  <circle cx="248" cy="350" r="8" fill="#005C46" />
  <path fill="#005C46"
        d="M 243 357
           L 253 357
           L 251 380
           L 245 380
           Z" />
</svg>
