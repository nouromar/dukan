<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    V3 "D on canopy sign"
    Flat-roof modern silhouette; the "D" lives on the canopy/awning
    band like a shopfront sign. Two colours — green primary + cream
    canopy. Reads as "shop with a name above the door".
  -->

  <!-- shop body, flat roof -->
  <rect x="80" y="160" width="352" height="272" fill="#005C46" />

  <!-- canopy band across the front -->
  <rect x="64" y="208" width="384" height="56" fill="#F5EFE6" />
  <!-- canopy underside shadow line (very subtle) -->
  <rect x="64" y="264" width="384" height="4" fill="#003D2E" />

  <!-- "D" sign centered on the canopy -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 224 220
           L 256 220
           A 22 22 0 0 1 256 252
           L 224 252
           Z
           M 236 228
           L 256 228
           A 10 10 0 0 1 256 244
           L 236 244
           Z" />

  <!-- rectangular doorway below the canopy -->
  <rect x="216" y="296" width="80" height="136" fill="#F5EFE6" />
</svg>
