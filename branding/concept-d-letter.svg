<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Concept "D-letter" — bold confident letterform.
    Single colour, scalable, reads at 48dp. Stays inside the
    adaptive-icon safe zone (centre 66% of canvas).
    Swap fill="#2E7D32" for whichever brand colour you settle on
    (deep green works; terracotta and warm yellow also fit a
    Somali-shop visual vocabulary).
  -->
  <path fill="#2E7D32" fill-rule="evenodd"
        d="M 112 112
           L 272 112
           A 144 144 0 0 1 272 400
           L 112 400
           Z
           M 192 192
           L 272 192
           A 64 64 0 0 1 272 320
           L 192 320
           Z" />
</svg>
