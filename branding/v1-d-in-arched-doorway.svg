<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    V1 "D in arched doorway"
    Shop silhouette + arched doorway with a "D" inset inside the
    doorway. Green primary; cream-on-white for the doorway opening
    so the inset D pops. The most figurative of the four — shop reads
    immediately, the D rewards a second look.
  -->

  <!-- shop body + pitched roof (single closed path) -->
  <path fill="#005C46"
        d="M 80 432
           L 80 200
           L 256 104
           L 432 200
           L 432 432
           Z" />

  <!-- arched doorway (cream so the inset D reads in the seed green) -->
  <path fill="#F5EFE6"
        d="M 200 432
           L 200 280
           A 56 56 0 0 1 312 280
           L 312 432
           Z" />

  <!-- "D" inset inside the doorway, in brand green -->
  <path fill="#005C46" fill-rule="evenodd"
        d="M 220 304
           L 264 304
           A 36 36 0 0 1 264 408
           L 220 408
           Z
           M 244 328
           L 264 328
           A 12 12 0 0 1 264 384
           L 244 384
           Z" />
</svg>
